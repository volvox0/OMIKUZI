<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER FORTUNE 2026</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* ここに以前のCSSを貼ってください */
        :root { --bg-color: #0a0a0a; --accent-color: #00f2ff; --card-bg: rgba(20,20,20,0.85); }
        body { font-family: sans-serif; background: var(--bg-color); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card-bg); padding: 40px; border-radius: 30px; text-align: center; border: 1px solid var(--accent-color); }
        .draw-btn { background: var(--accent-color); color: black; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="card" id="main-card">
            <h1>⚡️ CYBER FORTUNE 2026 ⚡️</h1>
            <div id="welcome-view">
                <div style="font-size: 5rem; margin: 20px;">🔮</div>
            </div>
            <div id="result-view" style="display:none;">
                <h2 id="res-luck"></h2>
                <p id="res-total"></p>
            </div>
            <button class="draw-btn" onclick="draw()">SCAN DESTINY</button>
        </div>
    </div>

    <script>
        // --- 運勢ロジック ---
        function draw() {
            const luck = Math.random() > 0.5 ? "大吉" : "吉";
            document.getElementById('welcome-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';
            document.getElementById('res-luck').innerText = luck;
            if(luck === "大吉") confetti();
        }

        // --- サービスワーカーの登録 (bodyの最後でOK) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW Registered!'))
                    .catch(err => console.error('SW Failed:', err));
            });
        }
    </script>
</body>
</html>
